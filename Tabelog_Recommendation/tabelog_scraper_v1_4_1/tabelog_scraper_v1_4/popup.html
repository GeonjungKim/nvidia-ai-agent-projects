<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  :root{
    --ink:#1c1a17; --muted:#8a8378; --line:#e7e2d8; --paper:#fbfaf7;
    --accent:#c9541f; --ok:#3f7d3a; --warn:#b8860b; --stop:#a33; --chip:#f2efe8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:320px;padding:16px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
       color:var(--ink);background:var(--paper)}
  h1{font-size:13px;letter-spacing:.02em;font-weight:700;display:flex;align-items:center;gap:6px}
  h1 .v{font-size:10px;color:var(--muted);font-weight:500}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}
  .stat{background:#fff;border:1px solid var(--line);border-radius:8px;padding:9px 10px}
  .stat .n{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
  .stat .l{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.04em}
  .stat.wide{grid-column:1/3}
  .stat.wide .n{font-size:13px;font-weight:600}
  .badge{font-size:11px;padding:2px 8px;border-radius:99px;background:var(--chip);color:var(--muted)}
  .badge.run{background:#eef6ed;color:var(--ok)} .badge.stop{background:#f7ecec;color:var(--stop)}
  .btn{width:100%;padding:10px;border:none;border-radius:8px;font-weight:600;font-size:13px;
       cursor:pointer;margin-bottom:8px}
  .btn.start{background:var(--accent);color:#fff}
  .btn.stop{background:#fff;color:var(--stop);border:1px solid var(--stop)}
  .btn.dl{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .note{font-size:10.5px;color:var(--muted);line-height:1.5;margin-top:6px}
  .warnrow{font-size:11px;color:var(--warn);margin-top:6px;display:none}
  label.cfg{font-size:11px;color:var(--muted);display:block;margin:10px 0 4px}
  textarea{width:100%;height:44px;border:1px solid var(--line);border-radius:6px;padding:6px;
           font-family:ui-monospace,Menlo,monospace;font-size:11px;resize:vertical}
  .row{display:flex;gap:8px} .row .btn{margin-bottom:0}
</style>
</head>
<body>
  <h1>🍜 Reviewer Scraper <span class="v" id="ver">v1.4 · tree-DFS</span></h1>

  <div style="margin-top:10px"><span id="state" class="badge">대기 중</span></div>

  <div class="grid">
    <div class="stat"><div class="n" id="n-records">0</div><div class="l">수집(고유)</div></div>
    <div class="stat"><div class="n" id="n-stack">0</div><div class="l">스택 잔량</div></div>
    <div class="stat"><div class="n" id="n-seen">0</div><div class="l">방문 노드</div></div>
    <div class="stat"><div class="n" id="n-loss">0</div><div class="l">손실 노드</div></div>
    <div class="stat wide"><div class="n" id="cur-reviewer">—</div><div class="l">현재 리뷰어</div></div>
  </div>

  <label class="cfg">리뷰어 슬러그 (쉼표 구분 · 예: maro, another)</label>
  <textarea id="reviewers" placeholder="maro"></textarea>

  <label class="cfg">시작 노드 URL <span style="color:var(--warn)">(선택 · 입력 시 이 노드의 서브트리만 순회 — 파일럿/부분 재수집)</span></label>
  <textarea id="start-url" style="height:34px" placeholder="예: https://tabelog.com/rvwr/maro/visited_restaurants/list/?pal=tokyo&amp;LstPrf=A1330"></textarea>

  <label class="cfg" style="display:flex;gap:6px;align-items:center;cursor:pointer">
    <input type="checkbox" id="keep-records" style="width:auto;margin:0">
    기존 레코드 유지(증분 병합 재크롤 — 방문기록·스택만 초기화, 동일 식당은 병합)
  </label>

  <div style="margin-top:12px">
    <button class="btn start" id="start">▶ 현재 리뷰어부터 수집 시작</button>
    <button class="btn dl" id="audit">📊 커버리지 감사 (현재 탭 노드)</button>
    <div class="row">
      <button class="btn stop" id="stop">■ 중지</button>
      <button class="btn dl" id="download">⭳ JSON</button>
    </div>
  </div>

  <div class="warnrow" id="warn">⚠ 저장 레코드가 많습니다. JSON으로 내보낸 뒤 초기화를 권장합니다.</div>
  <p class="note">시작: 트리를 건수 기준 분할해 자동 순회(페이지 간 5–8초, 자율 하한 5초).
  감사: 현재 탭 노드의 <b>자식 한 단계 건수만</b> 순차 fetch해 부모 건수와 검산(수집·상태 변경 없음,
  완료 시 JSON 리포트 자동 다운로드).</p>

  <script src="config.js"></script>
  <script src="parsers.js"></script>
  <script src="popup.js"></script>
</body>
</html>
